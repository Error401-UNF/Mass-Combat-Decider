name: Create Release

on:
  workflow_dispatch: # Allows you to trigger it manually via the GitHub Actions tab

permissions:
  contents: write # Crucial permission allowing the runner to create a release and attach assets

jobs:
  # ==========================================
  # JOB 1: Build the Linux AppImage
  # ==========================================
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev pkg-config libglib2.0-dev wget

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Release
        run: cargo build --release

      - name: Setup AppDir and Bundle
        run: |
          mkdir -p AppDir/usr/bin
          cp target/release/MassCombatDecider AppDir/usr/bin/
          strip AppDir/usr/bin/MassCombatDecider
          cp /usr/share/icons/Adwaita/scalable/devices/computer-symbolic.svg AppDir/MassCombatDecider.svg
          
          wget -c https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          
          wget -c "https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh"
          chmod +x linuxdeploy-plugin-gtk.sh

          export DEPLOY_GTK_VERSION=4
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            --executable AppDir/usr/bin/MassCombatDecider \
            -i AppDir/MassCombatDecider.svg \
            --create-desktop-file \
            --plugin gtk \
            --output appimage

          mv MassCombatDecider-x86_64.AppImage MassCombatDecider-Linux.AppImage

      - name: Upload Linux Intermediate Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-bin
          path: MassCombatDecider-Linux.AppImage

  # ==========================================
  # JOB 2: Build the Windows Portable Zip
  # ==========================================
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup MSYS2 Environment
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64 
        update: true 

    # 2. Install Dependencies (Added ntldd to the package string)
    - name: Install GTK4 and Rust Dependencies
      id: install_deps
      run: |
        PACKAGES="mingw-w64-x86_64-toolchain \
          mingw-w64-x86_64-pkg-config \
          mingw-w64-x86_64-gtk4 \
          mingw-w64-x86_64-libadwaita \
          mingw-w64-x86_64-glib2 \
          mingw-w64-x86_64-gobject-introspection \
          mingw-w64-x86_64-rust \
          mingw-w64-x86_64-ntldd \
          zip \
          git \
          make"

        RETRY_COUNT=0
        MAX_RETRIES=3
        
        while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
          pacman -Sy --noconfirm && pacman -S --noconfirm $PACKAGES
          if [ $? -eq 0 ]; then
            echo "Installation successful."
            exit 0
          else
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Installation failed. Retrying..."
            sleep 5
          fi
        done
        exit 1
      shell: msys2 {0}

    - name: Build GTK-RS Application
      run: CARGO_TARGET_DIR=build_output cargo build --release
      shell: msys2 {0}

    # 4. Packaging Step: Robust dependency parsing
    - name: Package Windows Executable with DLLs
      id: package
      run: |
        EXE_PATH="./build_output/release/MassCombatDecider.exe"
        PACKAGE_DIR="MassCombatDecider-Windows-Portable"
        
        # Clear out any stale directories and make clean folders
        rm -rf "${PACKAGE_DIR}"
        mkdir -p "${PACKAGE_DIR}/bin"
        mkdir -p "${PACKAGE_DIR}/share/glib-2.0/schemas"
        
        # 1. Copy the core executable
        cp "${EXE_PATH}" "${PACKAGE_DIR}/bin/"
        
        echo "Hunting down exact required DLL dependencies (Pure Bash)..."
        
        # Loop through each line output by ntldd natively
        ntldd -R "${EXE_PATH}" | while read -r line; do
            # Convert line to lowercase using bash built-ins for a safe check
            line_lower="${line,,}"
            
            # Check if the line contains "mingw64" using pure Bash matching
            if [[ "$line_lower" == *"mingw64"* && "$line" == *"=> "* ]]; then
                
                # Split line at "=> " to get everything on the right side
                right_side="${line#*=> }"
                
                # Parse tokens to find the absolute Windows path (e.g., C:\...)
                for token in $right_side; do
                    if [[ "$token" == ?:\\* ]]; then
                        win_path="$token"
                        break
                    fi
                done
                
                # If a valid path was extracted, convert and copy it
                if [ -n "$win_path" ]; then
                    clean_path=$(cygpath -u "$win_path")
                    if [ -f "$clean_path" ]; then
                        echo "Bundling: $(basename "$clean_path")"
                        cp "$clean_path" "${PACKAGE_DIR}/bin/"
                    fi
                fi
            fi
        done
        
        echo "Copying ONLY bare-minimum required GLib schemas (No Images!)"
        cp /mingw64/share/glib-2.0/schemas/*.gschema.xml "${PACKAGE_DIR}/share/glib-2.0/schemas/"
        
        echo "Compiling schemas for the portable environment..."
        TARGET_SCHEMA_DIR=$(cygpath -w "${PACKAGE_DIR}/share/glib-2.0/schemas")
        glib-compile-schemas "$TARGET_SCHEMA_DIR"
        
        echo "Zipping clean portable package..."
        zip -r MassCombatDecider-Windows.zip "${PACKAGE_DIR}"
      shell: msys2 {0}
      
    - name: Upload Windows Intermediate Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-bin
        path: MassCombatDecider-Windows.zip
  # ==========================================
  # JOB 3: Merge and Publish GitHub Release
  # ==========================================
  create-release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Need to check out the repo here to read Cargo.toml

      - name: Extract Version from Cargo.toml
        id: get_version
        run: |
          # Finds the first line matching version = "...", extracts the string, and formats it
          RAW_VERSION=$(grep -m 1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          TAG_NAME="$RAW_VERSION"
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Download Linux Build
        uses: actions/download-artifact@v4
        with:
          name: linux-bin
          path: ./release-assets

      - name: Download Windows Build
        uses: actions/download-artifact@v4
        with:
          name: windows-bin
          path: ./release-assets

      - name: Publish Official GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.tag }}
          name: Version ${{ steps.get_version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            ./release-assets/MassCombatDecider-Linux.AppImage
            ./release-assets/MassCombatDecider-Windows.zip